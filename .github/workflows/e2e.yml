name: e2e

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  unit:
    name: Unit + Integration
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit + integration tests
        run: npm test

  e2e:
    name: Real-Chrome E2E
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: unit

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Google Chrome
        id: chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Print Chrome version
        env:
          BRIX_CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
        run: |
          echo "Using Chrome at: $BRIX_CHROME_PATH"
          "$BRIX_CHROME_PATH" --version || true

      # 分两步跑而不是 `npm run e2e`：每个文件单独一个 step，超时和退出
      # 状态独立。上一轮 CI 上 downloads.test.ts 通过、http.test.ts 卡住，
      # 但合并跑时下载脚本的状态混进总输出里很难看清。拆开后任意一个挂
      # 也能立刻定位是哪个，artifact 上传时各自的 /tmp/brix-e2e-* 也都
      # 还在（没被对方的 stop() 清掉）。
      - name: E2E - downloads.test.ts
        env:
          BRIX_CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
          BRIX_CHROME_EXTRA_ARGS: "--no-sandbox --disable-dev-shm-usage --disable-gpu"
        timeout-minutes: 3
        run: xvfb-run -a --server-args="-screen 0 1920x1080x24" npx tsx --test --test-force-exit test/e2e/downloads.test.ts

      - name: E2E - http.test.ts
        if: always()
        env:
          BRIX_CHROME_PATH: ${{ steps.chrome.outputs.chrome-path }}
          BRIX_CHROME_EXTRA_ARGS: "--no-sandbox --disable-dev-shm-usage --disable-gpu"
        timeout-minutes: 4
        run: xvfb-run -a --server-args="-screen 0 1920x1080x24" npx tsx --test --test-force-exit test/e2e/http.test.ts

      - name: Upload brix stdio logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: brix-e2e-logs
          path: |
            /tmp/brix-e2e-*/brix-stdio.log
            /tmp/brix-e2e-*/data/logs/*.log
          if-no-files-found: ignore
          retention-days: 7
